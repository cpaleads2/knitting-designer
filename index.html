<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo to Amigurumi Parts</title>
<style>
  :root{
    --bg:#F7F5F0; --card:#FFFFFF; --ink:#241F1A; --ink-2:#6B6459;
    --line:#E4DFD5; --accent:#B5502C; --accent-bg:#F3E3DA;
    --teal:#0F6E56; --teal-bg:#E1F5EE;
    --blue:#185FA5; --blue-bg:#E6F1FB;
    --amber:#854F0B; --amber-bg:#FAEEDA;
    --coral:#993C1D; --coral-bg:#FAECE7;
    --purple:#534AB7; --purple-bg:#EEEDFE;
    --green:#2E7D32; --green-bg:#E7F5E8;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:'Segoe UI',system-ui,sans-serif; padding:2rem 1rem;}
  .wrap{max-width:640px; margin:0 auto;}
  .langbar{display:flex; gap:6px; margin-bottom:1rem;}
  .langbtn{border:1px solid var(--line); background:#fff; color:var(--ink-2); font-size:12px; padding:6px 12px; border-radius:20px; cursor:pointer; font-weight:600;}
  .langbtn.active{background:var(--ink); color:#fff; border-color:var(--ink);}
  h1{font-size:22px; font-weight:600; margin:0 0 4px;}
  h2{font-size:15px; font-weight:600; margin:1.5rem 0 0.75rem;}
  .sub{color:var(--ink-2); font-size:14px; margin:0 0 1.75rem;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:1.25rem; margin-bottom:1.25rem;}
  label{font-size:12px; color:var(--ink-2); display:block; margin-bottom:4px;}
  input[type=number], input[type=text], input[type=file], select{width:100%; padding:8px 9px; border:1px solid var(--line); border-radius:8px; font-size:13px; background:#fff; font-family:inherit;}
  .row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  button{cursor:pointer; border:none; border-radius:8px; padding:11px 16px; font-size:14px; font-weight:600; font-family:inherit;}
  .btn-primary{background:var(--accent); color:#fff; width:100%;}
  .btn-primary:disabled{background:#D8CFC2; cursor:not-allowed;}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--ink); font-size:13px; padding:9px 14px;}
  #preview{max-width:100%; max-height:220px; border-radius:10px; margin-top:10px; display:none;}
  .status{font-size:13px; color:var(--ink-2); margin-top:10px; min-height:18px;}
  .part{background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px;}
  .ptop{display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap;}
  .pname-input{font-weight:600; font-size:14px; border:1px solid transparent; padding:4px 6px; border-radius:6px; max-width:160px;}
  .pname-input:hover, .pname-input:focus{border-color:var(--line); outline:none;}
  .badge-select{font-size:11px; padding:3px 8px; border-radius:6px; font-weight:600; border:none;}
  .b-sphere{background:var(--teal-bg); color:var(--teal);}
  .b-cylinder{background:var(--blue-bg); color:var(--blue);}
  .b-disc{background:var(--amber-bg); color:var(--amber);}
  .b-cone{background:var(--coral-bg); color:var(--coral);}
  .b-oval{background:var(--purple-bg); color:var(--purple);}
  .b-panel{background:var(--green-bg); color:var(--green);}
  .pfields{display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; margin-top:10px;}
  .pfield{width:88px;}
  .pfield input{padding:6px 7px; font-size:12px;}
  .pcount{width:56px;}
  .pmeta{font-size:12px; color:var(--ink-2); margin-top:8px; display:flex; gap:14px; flex-wrap:wrap;}
  .pmeta b{color:var(--ink); font-weight:600;}
  table{width:100%; border-collapse:collapse; margin-top:8px; font-size:12px;}
  td{padding:5px 6px; border-top:1px solid var(--line);}
  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:1rem;}
  .stat{background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px;}
  .stat .n{font-size:22px; font-weight:700;}
  .stat .l{font-size:12px; color:var(--ink-2);}
  .toggle{background:transparent; border:1px solid var(--line); font-size:11px; padding:4px 10px; margin-top:8px;}
  .rm-btn{background:transparent; border:none; color:var(--ink-2); font-size:16px; padding:2px 6px;}
  .note{font-size:12px; color:var(--ink-2); line-height:1.5;}
  .deco{background:#fff; border:1px dashed var(--line); border-radius:12px; padding:10px 14px; margin-bottom:8px;}
  .deco b{font-size:13px;}
  .deco p{font-size:12px; color:var(--ink-2); margin:4px 0 0;}
  .addrow{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="langbar" id="langbar"></div>
  <h1 id="t-title"></h1>
  <p class="sub" id="t-sub"></p>

  <div class="card">
    <label id="t-photolabel" for="file"></label>
    <div style="display:flex; align-items:center; gap:10px;">
      <label class="btn-ghost" id="t-choosefile" for="file" style="cursor:pointer; white-space:nowrap;"></label>
      <span id="filename-display" style="font-size:13px; color:var(--ink-2);"></span>
    </div>
    <input type="file" id="file" accept="image/*" style="position:absolute; width:1px; height:1px; opacity:0; overflow:hidden;" />
    <img id="preview" />

    <div style="height:12px;"></div>
    <div class="row">
      <div>
        <label id="t-heightlabel" for="height"></label>
        <input type="number" id="height" value="15" min="3" max="60" />
      </div>
      <div>
        <label id="t-gaugelabel" for="stg"></label>
        <div style="display:flex; gap:6px;">
          <input type="number" id="stg" value="16" />
          <input type="number" id="rowg" value="14" />
        </div>
      </div>
    </div>

    <div style="height:14px;"></div>
    <button class="btn-primary" id="analyze" disabled></button>
    <div class="status" id="status"></div>
  </div>

  <div id="stats"></div>
  <div id="parts"></div>

  <div class="card">
    <label id="t-addlabel" style="margin-bottom:10px;"></label>
    <div class="addrow">
      <input type="text" id="np-name" />
      <select id="np-type"></select>
    </div>
    <button class="btn-ghost" id="add-part-btn" style="width:100%;"></button>
  </div>

  <div id="decorations"></div>
  <div id="pdf-section" style="display:none; margin-top:1rem;">
    <button class="btn-primary" id="generate-pdf-btn"></button>
    <div class="status" id="pdf-status"></div>
  </div>
  <p class="note" id="footnote"></p>
</div>

    analyzeBtn:'Створити схему',
    chooseFile:'Виберіть файл',
    noFileChosen:'Файл не вибрано',
    addLabel:'додати деталь вручну',
    namePlaceholder:'назва',
    addBtn:'+ додати',
    pieces:'деталей всього', types:'видів деталей', totalRounds:'рядів по іграшці',
    rounds:'рядів:', maxSt:'максимум петель:', pcs:'шт',
    showRows:'показати ряди', hideRows:'сховати ряди',
    decorHeader:'декоративні елементи (без розрахунку рядів)',
    footnote:'Пропорції підібрані за фото приблизно — поля вище можна редагувати вручну, звірте з реальним зразком щільності перед в’язанням.',

    pdfGenerating:'Збираємо PDF…',
    pdfError:(msg)=>'Не вдалося створити PDF: '+msg,
    analyzing:'Аналізуємо фото і підбираємо деталі…',
    doneText:(n,d)=>'Готово — знайдено '+n+' вид(ів) деталей'+(d?' і '+d+' декоративний елемент.':'.'),
    errorText:(msg)=>'Не вдалося розібрати фото: '+msg+'. Спробуйте інше зображення.',
    emptyKeyText:'ANTHROPIC_API_KEY не налаштований у Vercel (Settings → Environment Variables)',
    typeLabels:{sphere:'куля', cylinder:'циліндр', disc:'диск', cone:'конус', oval:'овал', panel:'полотно'},
    fieldLabels:{
      sphere:[['diam','діаметр, см'],['extra','пряма частина, см']],
      cylinder:[['diam','діаметр, см'],['extra','довжина, см']],
      disc:[['diam','діаметр, см']],
      cone:[['diam','діаметр, см'],['extra','звуження, см']],
      oval:[['length','довжина, см'],['width','ширина, см']],
      panel:[['length','ширина, см'],['width','висота, см']]
    },
    vocab:{sc:'ст.б/н', ch:'п.п.'},

let currentLang = 'en';
let selectedFileName = null;
let lastPartsCount = null, lastDecorCount = null;
let imageBase64 = null, imageMediaType = null;
let parts = [];
let decorations = [];
let openIdx = null;
let idCounter = 1;

function r2(x){ return Math.round((x||0)*100)/100; }

function ringLine(lang){
  const v=T[lang].vocab;
  return {en:'6 '+v.sc+' in magic ring (6)', ru:'6 '+v.sc+' в кольцо амигуруми (6)', uk:'6 '+v.sc+' в кільце амігурумі (6)'}[lang];
}
function incText(i, lang){
  const v=T[lang].vocab, rep=i-2;
  const tpl = {
    en: rep<=0 ? '(inc) x6' : '('+rep+' '+v.sc+', inc) x6',
    ru: rep<=0 ? '(прибавка) x6' : '('+rep+' '+v.sc+', прибавка) x6',
    uk: rep<=0 ? '(прибавка) x6' : '('+rep+' '+v.sc+', прибавка) x6'
  };
  return tpl[lang];
}
function decText(i, lang){
  const v=T[lang].vocab, rep=i-2;
  const tpl = {
    en: rep<=0 ? '(dec) x6' : '('+rep+' '+v.sc+', dec) x6',
    ru: rep<=0 ? '(убавка) x6' : '('+rep+' '+v.sc+', убавка) x6',
    uk: rep<=0 ? '(убавка) x6' : '('+rep+' '+v.sc+', убавка) x6'
  };
  return tpl[lang];
}
function aroundText(maxSt, lang){
  const v=T[lang].vocab;
  return {en:v.sc+' around ('+maxSt+')', ru:v.sc+' по кругу ('+maxSt+')', uk:v.sc+' по колу ('+maxSt+')'}[lang];
}

function incInfo(diameterCm, stPer10){
  const stPerCm = stPer10/10;
  const circumference = Math.PI*diameterCm;
  let maxSt = Math.round((circumference*stPerCm)/6)*6;
  if(maxSt<6) maxSt=6;
  return {maxSt, incRounds: maxSt/6};
}

function computeOval(lengthCm, widthCm, stg, rowg, lang){
  const v=T[lang].vocab;
  const stPerCm = stg/10;
  const straightSts = Math.max(2, Math.round((lengthCm - widthCm) * stPerCm));
  const widthRounds = Math.max(1, Math.round((widthCm * stPerCm) / 4));
  const rounds = []; let n=1;
  let count = straightSts*2 + 6;
  const chainTpl = {
    en: 'chain '+(straightSts+1)+'; work around: '+straightSts+' '+v.sc+', 3 '+v.sc+' in last st, '+straightSts+' '+v.sc+' along other side, 3 '+v.sc+' in first st ('+count+')',
    ru: 'цепочка из '+(straightSts+1)+' возд.п.; по кругу: '+straightSts+' сбн, 3 сбн в последнюю петлю, '+straightSts+' сбн по другой стороне, 3 сбн в первую петлю ('+count+')',
    uk: 'ланцюжок з '+(straightSts+1)+' п.п.; по колу: '+straightSts+' ст.б/н, 3 ст.б/н в останню петлю, '+straightSts+' ст.б/н по іншій стороні, 3 ст.б/н в першу петлю ('+count+')'
  };
  rounds.push({n:n++, text:chainTpl[lang]});
  for(let i=1;i<widthRounds;i++){
    count += 4;
    const incTpl = {
      en: 'inc, '+straightSts+' '+v.sc+', inc x2, '+straightSts+' '+v.sc+', inc ('+count+')',
      ru: 'прибавка, '+straightSts+' сбн, прибавка x2, '+straightSts+' сбн, прибавка ('+count+')',
      uk: 'прибавка, '+straightSts+' ст.б/н, прибавка x2, '+straightSts+' ст.б/н, прибавка ('+count+')'
    };
    rounds.push({n:n++, text:incTpl[lang]});
  }
  return {rounds, maxSt:count, total:rounds.length, height:r2(widthCm)};
}

function computePanel(widthCm, heightCm, stg, rowg, lang){
  const v=T[lang].vocab;
  const stPerCm = stg/10, rowPerCm = rowg/10;
  const widthSts = Math.max(2, Math.round(widthCm*stPerCm));
  const heightRows = Math.max(1, Math.round(heightCm*rowPerCm));
  const rounds = []; let n=1;
  const chainTpl = {en:'chain '+(widthSts+1), ru:'цепочка из '+(widthSts+1)+' возд.п.', uk:'ланцюжок з '+(widthSts+1)+' п.п.'};
  rounds.push({n:n++, text:chainTpl[lang]});
  const rowTpl = {
    en: 'row of '+v.sc+', '+widthSts+' sts, turn',
    ru: 'ряд сбн по '+widthSts+' петель, повернуть вязание',
    uk: 'ряд ст.б/н, '+widthSts+' петель, повернути в’язання'
  };
  for(let r=0;r<heightRows;r++) rounds.push({n:n++, text:rowTpl[lang]});
  return {rounds, maxSt:widthSts, total:rounds.length, height:r2(heightCm)};
}

function computePart(p, stg, rowg, lang){
  if(p.type==='oval') return computeOval(p.length||3, p.width||1.5, stg, rowg, lang);
  if(p.type==='panel') return computePanel(p.length||3, p.width||3, stg, rowg, lang);

  const info = incInfo(p.diam||3, stg);
  const maxSt = info.maxSt, incRounds = info.incRounds;
  const rowPerCm = rowg/10;
  const rounds = []; let n=1;
  rounds.push({n:n++, text:ringLine(lang)});
  for(let i=2;i<=incRounds;i++) rounds.push({n:n++, text:incText(i,lang)+' ('+(6*i)+')'});
  if(p.type==='disc') return {rounds, maxSt, total:rounds.length, height:(rounds.length/rowPerCm).toFixed(1)};

  const straight = Math.max(0, Math.round((p.extra||0)*rowPerCm));
  for(let j=0;j<straight;j++) rounds.push({n:n++, text:aroundText(maxSt,lang)});
  if(p.type==='cylinder') return {rounds, maxSt, total:rounds.length, height:(rounds.length/rowPerCm).toFixed(1)};

  if(p.type==='sphere'){ for(let i=incRounds;i>=2;i--) rounds.push({n:n++, text:decText(i,lang)+' ('+(6*(i-1))+')'}); }
  else if(p.type==='cone'){ for(let i=incRounds;i>=2;i-=2) rounds.push({n:n++, text:decText(i,lang)+' ('+(6*(i-1))+')'}); }
  return {rounds, maxSt, total:rounds.length, height:(rounds.length/rowPerCm).toFixed(1)};
}

function setLang(lang){
  currentLang = lang;
  const t = T[lang];
  document.getElementById('langbar').innerHTML = Object.keys(T).map(function(l){
    return '<button class="langbtn'+(l===lang?' active':'')+'" data-lang="'+l+'">'+T[l].langName+'</button>';
  }).join('');
  document.querySelectorAll('.langbtn').forEach(function(b){
    b.addEventListener('click', function(){ setLang(b.dataset.lang); });
  });

  document.getElementById('t-title').textContent = t.title;
  document.getElementById('t-sub').textContent = t.sub;
  document.getElementById('t-photolabel').textContent = t.photoLabel;
  document.getElementById('t-choosefile').textContent = t.chooseFile;
  document.getElementById('filename-display').textContent = selectedFileName || t.noFileChosen;
  document.getElementById('t-heightlabel').textContent = t.heightLabel;
  document.getElementById('t-gaugelabel').textContent = t.gaugeLabel;
  document.getElementById('analyze').textContent = t.analyzeBtn;
  document.getElementById('t-addlabel').textContent = t.addLabel;
  document.getElementById('np-name').placeholder = t.namePlaceholder;
  document.getElementById('add-part-btn').textContent = t.addBtn;
  document.getElementById('generate-pdf-btn').textContent = t.generatePdfBtn;

  const typeSel = document.getElementById('np-type');
  typeSel.innerHTML = Object.keys(t.typeLabels).map(function(k){ return '<option value="'+k+'">'+t.typeLabels[k]+'</option>'; }).join('');

  if(lastPartsCount !== null){
    document.getElementById('status').textContent = t.doneText(lastPartsCount, lastDecorCount);
  }

  renderParts();
}

function renderParts(){
  const t = T[currentLang];
  const stg = parseFloat(document.getElementById('stg').value)||16;
  const rowg = parseFloat(document.getElementById('rowg').value)||14;
  const box = document.getElementById('parts');
  box.innerHTML = '';
  let totalRounds=0, totalPieces=0;

  parts.forEach((p, idx) => {
    const res = computePart(p, stg, rowg, currentLang);
    totalRounds += res.total * p.count;
    totalPieces += p.count;

    const fields = t.fieldLabels[p.type];
    const fieldsHtml = fields.map(function(f){
      return '<div class="pfield"><label>'+f[1]+'</label><input type="number" step="0.5" min="0.5" data-field="'+f[0]+'" data-idx="'+idx+'" value="'+r2(p[f[0]])+'"></div>';
    }).join('');

    const el = document.createElement('div');
    el.className = 'part';
    const rowsHtml = res.rounds.map(function(r){ return '<tr><td style="color:var(--ink-2);width:30px;">'+r.n+'</td><td>'+r.text+'</td></tr>'; }).join('');
    const typeOptions = Object.keys(t.typeLabels).map(function(k){ return '<option value="'+k+'"'+(k===p.type?' selected':'')+'>'+t.typeLabels[k]+'</option>'; }).join('');
    el.innerHTML =
      '<div class="ptop">'+
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'+
          '<select class="badge-select b-'+p.type+'" data-idx="'+idx+'" data-field="type">'+typeOptions+'</select>'+
          '<input class="pname-input" type="text" data-idx="'+idx+'" data-field="name" value="'+p.name+'">'+
          '<div class="pfield pcount"><label>'+t.pcs+'</label><input type="number" min="1" data-field="count" data-idx="'+idx+'" value="'+p.count+'"></div>'+
        '</div>'+
        '<button class="rm-btn" data-remove="'+idx+'" aria-label="remove">×</button>'+
      '</div>'+
      '<div class="pfields">'+fieldsHtml+'</div>'+
      '<div class="pmeta">'+
        '<span>'+t.rounds+' <b>'+res.total+'</b></span>'+
        '<span>'+t.maxSt+' <b>'+res.maxSt+'</b></span>'+
      '</div>'+
      '<button class="toggle" data-i="'+idx+'">'+(openIdx===idx?t.hideRows:t.showRows)+'</button>'+
      (openIdx===idx ? '<table><tbody>'+rowsHtml+'</tbody></table>' : '');
    box.appendChild(el);
  });

  box.querySelectorAll('[data-i]').forEach(function(btn){
    btn.addEventListener('click', function(){ openIdx = openIdx===parseInt(btn.dataset.i) ? null : parseInt(btn.dataset.i); renderParts(); });
  });
  box.querySelectorAll('[data-remove]').forEach(function(btn){
    btn.addEventListener('click', function(){ parts.splice(parseInt(btn.dataset.remove),1); renderParts(); });
  });
  box.querySelectorAll('[data-field]').forEach(function(inp){
    inp.addEventListener('change', function(){
      const idx = parseInt(inp.dataset.idx), field = inp.dataset.field;
      if(field==='name') parts[idx].name = inp.value;
      else if(field==='type') parts[idx].type = inp.value;
      else parts[idx][field] = r2(parseFloat(inp.value));
      renderParts();
    });
  });

  document.getElementById('stats').innerHTML = parts.length ? (
    '<div class="stats">'+
      '<div class="stat"><div class="n">'+totalPieces+'</div><div class="l">'+t.pieces+'</div></div>'+
      '<div class="stat"><div class="n">'+parts.length+'</div><div class="l">'+t.types+'</div></div>'+
      '<div class="stat"><div class="n">'+totalRounds+'</div><div class="l">'+t.totalRounds+'</div></div>'+
    '</div>') : '';

  document.getElementById('decorations').innerHTML = decorations.length ?
    '<h2>'+t.decorHeader+'</h2>' +
    decorations.map(function(d){ return '<div class="deco"><b>'+d.name+'</b><p>'+d.instruction+'</p></div>'; }).join('')
    : '';

  document.getElementById('footnote').textContent = decorations.length || parts.length ? t.footnote : '';
  document.getElementById('pdf-section').style.display = parts.length ? 'block' : 'none';
}

const fileInput = document.getElementById('file');
const preview = document.getElementById('preview');
const analyzeBtn = document.getElementById('analyze');
const statusEl = document.getElementById('status');

fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if(!f) return;
  imageMediaType = f.type;
  selectedFileName = f.name;
  document.getElementById('filename-display').textContent = selectedFileName;
  const reader = new FileReader();
  reader.onload = () => {
    imageBase64 = reader.result.split(',')[1];
    preview.src = reader.result;
    preview.style.display = 'block';
    analyzeBtn.disabled = false;
  };
  reader.readAsDataURL(f);
});

document.getElementById('add-part-btn').addEventListener('click', function(){
  const name = document.getElementById('np-name').value.trim() || T[currentLang].namePlaceholder;
  const type = document.getElementById('np-type').value;
  parts.push({id:idCounter++, name:name, type:type, count:1, diam:3, extra:0, length:3, width:1.5});
  document.getElementById('np-name').value='';
  renderParts();
});

['stg','rowg'].forEach(function(id){ document.getElementById(id).addEventListener('input', renderParts); });

analyzeBtn.addEventListener('click', async function(){
  const t = T[currentLang];
  analyzeBtn.disabled = true;
  statusEl.textContent = t.analyzing;
  document.getElementById('footnote').textContent = '';

  const system = 'You help break down a photo or sketch of a crocheted amigurumi toy into geometric primitives for pattern calculation. ' +
    'Ignore background props (baskets, accessories not on the toy itself) — describe only the main character. ' +
    'Identify all visually distinct body parts: head, body, ears, arms, legs, tail, muzzle, any protrusions. ' +
    'Classify each by the closest primitive: sphere (round part), cylinder (elongated tube with even diameter), ' +
    'disc (flat round element), cone (tapering part), oval (flat elongated part — length clearly greater than width, e.g. animal ears), ' +
    'panel (flat rectangular piece worked in rows back-and-forth, not in the round — use for separate garment-like pieces such as a vest, cape or onesie if it looks like an attached layer rather than part of the body). ' +
    'Separately list decorative elements that do not map to a primitive and are not a large piece (bows, sewn-on notions like eyes, embroidery) in the decorations field with a brief construction note. ' +
    'Write all "name" and "instruction" values in ' + t.promptLang + '. ' +
    'Respond ONLY with valid JSON, no markdown, no preamble, exactly matching this schema: ' +
    '{"parts":[{"name":"string","type":"sphere|cylinder|disc|cone|oval|panel","count":integer,' +
    '"diam_ratio":number 0.02-1 (for sphere/cylinder/disc/cone — diameter as a fraction of toy height),' +
    '"length_ratio":number 0-1 (for sphere/cylinder/cone — extra straight length as a fraction of height; for oval — long axis; for panel — width as a fraction of height),' +
    '"width_ratio":number 0.02-1 (for oval — short axis; for panel — height as a fraction of toy height)}],' +
    '"decorations":[{"name":"string","instruction":"brief 1-2 sentence construction note"}]}';

  try{
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1200,
        system: system,
        messages: [{
          role: 'user',
          content: [
            {type:'image', source:{type:'base64', media_type:imageMediaType, data:imageBase64}},
            {type:'text', text:'Break this toy down into amigurumi crochet parts.'}
          ]
        }]
      })
    });
    const data = await response.json();
    const textBlock = (data.content || []).find(function(c){ return c.type === 'text'; });
    if(!textBlock) throw new Error(data.error && data.error.message ? data.error.message : (data.error || 'Empty response'));
    const clean = textBlock.text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    const totalHeight = parseFloat(document.getElementById('height').value)||15;

    parts = (parsed.parts||[]).map(function(p){
      const type = ['sphere','cylinder','disc','cone','oval','panel'].indexOf(p.type)>=0 ? p.type : 'sphere';
      const base = {id:idCounter++, name:p.name, type:type, count:Math.max(1, parseInt(p.count)||1)};
      if(type==='oval' || type==='panel'){
        base.length = r2(Math.max(0.5, (p.length_ratio||0.2) * totalHeight));
        base.width = r2(Math.max(0.5, (p.width_ratio||0.1) * totalHeight));
        base.diam = 0; base.extra = 0;
      } else {
        base.diam = r2(Math.max(0.5, (p.diam_ratio||0.2) * totalHeight));
        base.extra = r2(Math.max(0, (p.length_ratio||0) * totalHeight));
        base.length = 3; base.width = 1.5;
      }
      return base;
    });
    decorations = (parsed.decorations||[]).map(function(d){ return {name:d.name, instruction:d.instruction}; });

    openIdx = null;
    lastPartsCount = parts.length;
    lastDecorCount = decorations.length;
    statusEl.textContent = t.doneText(parts.length, decorations.length);
    renderParts();
  }catch(err){
    statusEl.textContent = t.errorText(err.message);
  }finally{
    analyzeBtn.disabled = false;
  }
});

document.getElementById('generate-pdf-btn').addEventListener('click', async function(){
  const t = T[currentLang];
  const btn = document.getElementById('generate-pdf-btn');
  const pdfStatus = document.getElementById('pdf-status');
  btn.disabled = true;
  pdfStatus.textContent = t.pdfGenerating;

  const stg = parseFloat(document.getElementById('stg').value)||16;
  const rowg = parseFloat(document.getElementById('rowg').value)||14;
  const height = parseFloat(document.getElementById('height').value)||15;

  try{
    const response = await fetch('/api/generate-pdf', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ lang: currentLang, height, stg, rowg, title: (parts[0] && parts[0].name) ? T[currentLang].title : '', parts, decorations })
    });
    if(!response.ok){
      const err = await response.json().catch(function(){ return {error:'HTTP '+response.status}; });
      throw new Error(err.error || ('HTTP '+response.status));
    }
    const blob = await response.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'pattern.pdf';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    pdfStatus.textContent = '';
  }catch(err){
    pdfStatus.textContent = t.pdfError(err.message);
  }finally{
    btn.disabled = false;
  }
});

setLang('en');
</script>
